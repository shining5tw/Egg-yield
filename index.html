<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>茂生契約牧場產量紀錄 v2.6.0</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & React-DOM CDNs (Production build) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel Standalone CDN (For compiling JSX in browser) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Google Fonts - Noto Sans TC -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Noto Sans TC', sans-serif;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn {
      animation: fadeIn 0.2s ease-out forwards;
    }
    /* 自訂捲軸樣式，讓手機與網頁排版更精緻 */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f5f9;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
  </style>
</head>
<body class="bg-slate-100 text-slate-800">

  <!-- React 掛載點 -->
  <div id="root"></div>

  <!-- React 應用程式本體 -->
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // 系統版本號與開發者資訊
    const VERSION = 'v2.6.0';
    const UPDATE_DATE = '2026-06-10';
    const DEVELOPER = '吳尚穎';

    // 茂生契約牧場預設名單
    const DEFAULT_RANCHES = [
      '高秀', '隆記', '牧夏', '中將一', '中將二', 
      '宏觀', '禾多', '富陞', '永瀠', '壹澤', 
      '高昇', '高展', '顓承', '建發', '益禽', '嘉威'
    ];

    // 預設牧場與型態配對關係
    const INITIAL_RANCH_MAPPING = {
      '高秀': '密閉水簾場',
      '隆記': '密閉水簾場',
      '牧夏': '密閉水簾場',
      '中將一': '密閉水簾場',
      '中將二': '密閉水簾場',
      '宏觀': '密閉水簾場',
      '禾多': '密閉水簾場',
      '富陞': '密閉水簾場',
      '永瀠': '密閉水簾場',
      '壹澤': '密閉水簾場',
      '高昇': '傳統場',
      '高展': '傳統場',
      '顓承': '傳統場',
      '建發': '傳統場',
      '益禽': '傳統場',
      '嘉威': '傳統場'
    };

    // 牧場型態選項
    const RANCH_TYPES = ['傳統場', '高床場', '密閉水簾場'];

    // 預設蛋種
    const EGG_TYPES = ['散白蛋', '機白蛋', '散紅蛋', '機紅蛋', '粉殼蛋', '綠殼蛋'];

    // 預設蛋雞類別
    const CHICKEN_TYPES = ['白雞', '紅雞', '土雞', '烏骨雞'];

    // 蛋雞與蛋種之勾稽連動關係
    const CHICKEN_TO_EGG_MAP = {
      '白雞': ['散白蛋', '機白蛋'],
      '紅雞': ['散紅蛋', '機紅蛋'],
      '土雞': ['粉殼蛋'],
      '烏骨雞': ['綠殼蛋']
    };

    // 計量與換算常數
    const CART_TO_BOX_RATIO = 22;
    const CART_TO_EGG_RATIO = 4320;
    const BOX_TO_EGG_RATIO = 4320 / 22; // 每箱約 196.36 顆
    const WARNING_BOX_TO_EGG_RATIO = 200; // 產蛋量異常警告計算：散蛋箱折算 200 顆

    // --- 輔助函式：確保 CSV 格式安全脫逸 ---
    const escapeCSV = (val) => {
      if (val === undefined || val === null) return '""';
      const stringVal = String(val);
      return `"${stringVal.replace(/"/g, '""')}"`;
    };

    // --- 輔助函式：計算單筆紀錄的折算數據 ---
    const calculateEggTotals = (eggs, activeEggTypes) => {
      let totalBoxes = 0;
      let totalEggs = 0;
      let totalCartsForWarning = 0;
      let totalLooseBoxesForWarning = 0;

      if (eggs) {
        activeEggTypes.forEach(type => {
          const egg = eggs[type];
          if (egg) {
            const carts = parseFloat(egg.carts) || 0;
            const boxes = parseFloat(egg.boxes) || 0;
            const trayBoxes = parseFloat(egg.trayBoxes) || 0;

            totalBoxes += (carts * CART_TO_BOX_RATIO) + boxes + trayBoxes;
            totalEggs += (carts * CART_TO_EGG_RATIO) + (boxes + trayBoxes) * BOX_TO_EGG_RATIO;
            
            totalCartsForWarning += carts;
            totalLooseBoxesForWarning += boxes;
          }
        });
      }

      return {
        totalBoxes,
        totalEggs: Math.round(totalEggs),
        totalCartsForWarning,
        totalLooseBoxesForWarning
      };
    };

    function App() {
      // --- 狀態管理 (使用專屬 GitHub Namespace 防範同網域快取碰撞) ---
      const [ranches, setRanches] = useState(() => {
        const saved = localStorage.getItem('maosheng_gh_ranch_list_v2_5');
        return saved ? JSON.parse(saved) : DEFAULT_RANCHES;
      });

      const [ranchMapping, setRanchMapping] = useState(() => {
        const saved = localStorage.getItem('maosheng_gh_ranch_mapping_v2_5');
        return saved ? JSON.parse(saved) : INITIAL_RANCH_MAPPING;
      });
      
      const [records, setRecords] = useState(() => {
        const saved = localStorage.getItem('maosheng_gh_ranch_records_v2_5');
        if (saved) return JSON.parse(saved);
        
        // 預設初始模擬資料
        const today = new Date().toISOString().split('T')[0];
        const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
        return [
          { 
            id: '1', 
            ranch: '高秀', 
            ranchType: '密閉水簾場',
            date: today, 
            mortality: 2, 
            notes: '產蛋情況良好，水簾運作正常維持25度。', 
            eggs: { 
              '散白蛋': { carts: 3, boxes: 5, trayBoxes: 2 }
            },
            chickens: { '白雞': { count: 15000, mortality: 2 } }
          },
          { 
            id: '2', 
            ranch: '中將一', 
            ranchType: '密閉水簾場',
            date: today, 
            mortality: 4, 
            notes: '自動化集蛋正常。', 
            eggs: { 
              '機白蛋': { carts: 5, boxes: 0, trayBoxes: 12 }
            },
            chickens: { '白雞': { count: 24000, mortality: 4 } }
          },
          { 
            id: '3', 
            ranch: '隆記', 
            ranchType: '密閉水簾場',
            date: yesterday, 
            mortality: 1, 
            notes: '', 
            eggs: { 
              '散紅蛋': { carts: 3, boxes: 15, trayBoxes: 8 }
            },
            chickens: { '紅雞': { count: 18000, mortality: 1 } }
          }
        ];
      });

      // 初始化蛋種數量狀態
      const getInitialEggsState = () => {
        const state = {};
        EGG_TYPES.forEach(type => {
          state[type] = { carts: '', boxes: '', trayBoxes: '' };
        });
        return state;
      };

      // 初始化雞隻複選與羽數/死亡數狀態
      const getInitialChickensState = () => {
        const state = {};
        CHICKEN_TYPES.forEach(type => {
          state[type] = { checked: false, count: '', mortality: '' };
        });
        return state;
      };

      // 表單輸入狀態
      const [formData, setFormData] = useState({
        ranch: ranches[0] || '',
        ranchType: INITIAL_RANCH_MAPPING[ranches[0]] || RANCH_TYPES[0],
        date: new Date().toISOString().split('T')[0], // 產蛋日
        notes: '',      // 現場備註
        eggs: getInitialEggsState(),      
        chickens: getInitialChickensState() 
      });

      // UI 控制狀態
      const [activeTab, setActiveTab] = useState('input'); // input, history, analytics, settings
      const [newRanchName, setNewRanchName] = useState('');
      const [newRanchType, setNewRanchType] = useState('傳統場');
      const [filterRanch, setFilterRanch] = useState('all');
      const [toast, setToast] = useState({ show: false, message: '', type: 'success' });
      const [editingRecord, setEditingRecord] = useState(null);

      // 產蛋率異常警示彈窗 (Modal)
      const [alertModal, setAlertModal] = useState({
        show: false,
        title: '',
        message: '',
        percentage: 0,
        totalEggs: 0,
        totalChickens: 0,
        onConfirm: null
      });

      // --- 2. 核心記憶化計算 (useMemo) ---
      
      const filteredRecords = useMemo(() => {
        return filterRanch === 'all' 
          ? records 
          : records.filter(r => r.ranch === filterRanch);
      }, [records, filterRanch]);

      const stats = useMemo(() => {
        let totalCarts = 0;
        let totalBoxes = 0;
        let totalTrayBoxes = 0;
        let totalConvertedBoxes = 0;
        let totalEggsCalculated = 0;
        let totalMortality = 0;

        filteredRecords.forEach(rec => {
          const { totalBoxes: recBoxes, totalEggs: recEggs } = calculateEggTotals(rec.eggs, EGG_TYPES);
          totalConvertedBoxes += recBoxes;
          totalEggsCalculated += recEggs;

          if (rec.eggs) {
            EGG_TYPES.forEach(type => {
              const egg = rec.eggs[type];
              if (egg) {
                totalCarts += egg.carts || 0;
                totalBoxes += egg.boxes || 0;
                totalTrayBoxes += egg.trayBoxes || 0;
              }
            });
          }
          totalMortality += rec.mortality || 0;
        });

        const avgMortality = filteredRecords.length ? (totalMortality / filteredRecords.length).toFixed(1) : 0;

        return {
          totalCarts,
          totalBoxes,
          totalTrayBoxes,
          totalConvertedBoxes,
          totalEggsCalculated,
          totalMortality,
          avgMortality,
          recordCount: filteredRecords.length
        };
      }, [filteredRecords]);

      const sortedRecords = useMemo(() => {
        return [...filteredRecords].sort((a, b) => new Date(a.date) - new Date(b.date));
      }, [filteredRecords]);

      // --- 3. 副作用處理 (LocalStorage 同步) ---
      useEffect(() => {
        localStorage.setItem('maosheng_gh_ranch_records_v2_5', JSON.stringify(records));
      }, [records]);

      useEffect(() => {
        localStorage.setItem('maosheng_gh_ranch_list_v2_5', JSON.stringify(ranches));
        localStorage.setItem('maosheng_gh_ranch_mapping_v2_5', JSON.stringify(ranchMapping));
      }, [ranches, ranchMapping]);

      // --- 4. 功能性處理函式 ---

      const showToast = (message, type = 'success') => {
        setToast({ show: true, message, type });
        setTimeout(() => {
          setToast({ show: false, message: '', type: 'success' });
        }, 3000);
      };

      const handleRanchNameChange = (e) => {
        const selectedRanch = e.target.value;
        const mappedType = ranchMapping[selectedRanch] || RANCH_TYPES[0];
        setFormData(prev => ({
          ...prev,
          ranch: selectedRanch,
          ranchType: mappedType
        }));
      };

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => ({
          ...prev,
          [name]: value
        }));
      };

      const handleEggQtyChange = (type, field, value) => {
        setFormData(prev => {
          const current = prev.eggs[type];
          return {
            ...prev,
            eggs: {
              ...prev.eggs,
              [type]: { ...current, [field]: value }
            }
          };
        });
      };

      const handleChickenCheckboxChange = (type) => {
        setFormData(prev => {
          const current = prev.chickens[type];
          const isChecked = !current.checked;
          return {
            ...prev,
            chickens: {
              ...prev.chickens,
              [type]: { 
                ...current, 
                checked: isChecked, 
                count: isChecked ? current.count : '',
                mortality: isChecked ? current.mortality : ''
              }
            }
          };
        });
      };

      const handleChickenCountChange = (type, value) => {
        setFormData(prev => {
          const current = prev.chickens[type];
          return {
            ...prev,
            chickens: {
              ...prev.chickens,
              [type]: { ...current, count: value }
            }
          };
        });
      };

      const handleChickenMortalityChange = (type, value) => {
        setFormData(prev => {
          const current = prev.chickens[type];
          return {
            ...prev,
            chickens: {
              ...prev.chickens,
              [type]: { ...current, mortality: value }
            }
          };
        });
      };

      const getUnlockedEggTypes = () => {
        const unlocked = [];
        Object.keys(formData.chickens).forEach(chickenType => {
          const item = formData.chickens[chickenType];
          if (item.checked && item.count && parseFloat(item.count) > 0) {
            const mappedEggs = CHICKEN_TO_EGG_MAP[chickenType] || [];
            unlocked.push(...mappedEggs);
          }
        });
        return unlocked;
      };

      const unlockedEggs = getUnlockedEggTypes();

      const executeSaveRecord = (eggsData, chickensData, totalMortalityNum) => {
        if (editingRecord) {
          setRecords(records.map(rec => rec.id === editingRecord ? {
            ...rec,
            ranch: formData.ranch,
            ranchType: formData.ranchType,
            date: formData.date,
            mortality: totalMortalityNum, 
            notes: formData.notes,
            ratio: CART_TO_BOX_RATIO,
            eggs: eggsData,
            chickens: chickensData
          } : rec));
          showToast('產量紀錄已順利更新！');
          setEditingRecord(null);
        } else {
          const newRecord = {
            id: Date.now().toString(),
            ranch: formData.ranch,
            ranchType: formData.ranchType,
            date: formData.date,
            mortality: totalMortalityNum, 
            notes: formData.notes,
            ratio: CART_TO_BOX_RATIO,
            eggs: eggsData,
            chickens: chickensData
          };
          setRecords([newRecord, ...records]);
          showToast('產量紀錄儲存成功！');
        }

        setFormData({
          ...formData,
          notes: '',
          eggs: getInitialEggsState(),
          chickens: getInitialChickensState()
        });
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!formData.ranch) {
          showToast('請先選擇或新增牧場！', 'error');
          return;
        }

        const chickensData = {};
        let totalChickensCount = 0;
        let totalMortalityNum = 0;
        let hasChickenFilled = false;
        let hasNegativeMortality = false;

        Object.keys(formData.chickens).forEach(type => {
          const item = formData.chickens[type];
          if (item.checked && item.count) {
            hasChickenFilled = true;
            const countVal = parseFloat(item.count) || 0;
            const mortVal = parseInt(item.mortality, 10) || 0;
            
            if (mortVal < 0) hasNegativeMortality = true;

            chickensData[type] = { count: countVal, mortality: mortVal };
            totalChickensCount += countVal;
            totalMortalityNum += mortVal;
          }
        });

        if (hasNegativeMortality) {
          showToast('死亡數量不能為負數！', 'error');
          return;
        }

        if (!hasChickenFilled) {
          showToast('請至少選擇並填入一種蛋雞的數量！', 'error');
          return;
        }

        const eggsData = {};
        let hasSelectedEggQty = false;
        let totalCartsCount = 0;
        let totalLooseBoxesCount = 0;
        
        unlockedEggs.forEach(type => {
          const eggState = formData.eggs[type];
          const cartsVal = parseFloat(eggState.carts) || 0;
          const boxesVal = parseFloat(eggState.boxes) || 0;
          const trayBoxesVal = parseFloat(eggState.trayBoxes) || 0;

          if (cartsVal > 0 || boxesVal > 0 || trayBoxesVal > 0) {
            hasSelectedEggQty = true;
          }
          
          eggsData[type] = {
            carts: cartsVal,
            boxes: boxesVal,
            trayBoxes: trayBoxesVal
          };

          totalCartsCount += cartsVal;
          totalLooseBoxesCount += boxesVal;
        });

        if (!hasSelectedEggQty) {
          showToast('請在解鎖的蛋種中，至少填入一項產蛋數量！', 'error');
          return;
        }

        const calculatedTotalEggs = (totalCartsCount * CART_TO_EGG_RATIO) + (totalLooseBoxesCount * WARNING_BOX_TO_EGG_RATIO);
        const eggProductiveRate = totalChickensCount > 0 ? (calculatedTotalEggs / totalChickensCount) : 0;
        const minThreshold = totalChickensCount * 0.85;
        const maxThreshold = totalChickensCount;

        if (calculatedTotalEggs < minThreshold || calculatedTotalEggs > maxThreshold) {
          const formattedRate = (eggProductiveRate * 100).toFixed(1);
          setAlertModal({
            show: true,
            title: '⚠️ 產蛋產量異常安全警示',
            message: `系統偵測到全場「台車 + 散箱」產蛋估算總量為 ${calculatedTotalEggs.toLocaleString()} 顆，佔總飼養雞隻數（${totalChickensCount.toLocaleString()} 隻）之產蛋率為 ${formattedRate}%。

【注意】本數據已超出安全標準區間（85% ~ 100%）。請核對現場申報數量是否有誤：
1. 是否有台車數或散箱數輸入錯誤？
2. 是否有漏勾選或多勾選現存蛋雞種類？`,
            percentage: parseFloat(formattedRate),
            totalEggs: calculatedTotalEggs,
            totalChickens: totalChickensCount,
            onConfirm: () => {
              setAlertModal(prev => ({ ...prev, show: false }));
              executeSaveRecord(eggsData, chickensData, totalMortalityNum);
            }
          });
        } else {
          executeSaveRecord(eggsData, chickensData, totalMortalityNum);
        }
      };

      const handleDelete = (id) => {
        setRecords(records.filter(rec => rec.id !== id));
        showToast('紀錄已成功刪除！', 'info');
      };

      const handleEditInit = (record) => {
        setEditingRecord(record.id);
        
        const chickensState = getInitialChickensState();
        if (record.chickens) {
          Object.keys(record.chickens).forEach(type => {
            if (chickensState[type]) {
              chickensState[type].checked = true;
              const chickenData = record.chickens[type];
              if (typeof chickenData === 'object' && chickenData !== null) {
                 chickensState[type].count = chickenData.count || '';
                 chickensState[type].mortality = chickenData.mortality !== undefined ? chickenData.mortality : '';
              } else {
                 chickensState[type].count = chickenData || '';
                 chickensState[type].mortality = '';
              }
            }
          });
        }

        const eggsState = getInitialEggsState();
        if (record.eggs) {
          Object.keys(record.eggs).forEach(type => {
            if (eggsState[type]) {
              eggsState[type].carts = record.eggs[type].carts || '';
              eggsState[type].boxes = record.eggs[type].boxes || '';
              eggsState[type].trayBoxes = record.eggs[type].trayBoxes || '';
            }
          });
        }

        setFormData({
          ranch: record.ranch,
          ranchType: record.ranchType || RANCH_TYPES[0],
          date: record.date,
          notes: record.notes,
          eggs: eggsState,
          chickens: chickensState
        });
        
        setActiveTab('input');
        showToast('已載入欲編輯的產量資料', 'info');
      };

      const handleAddRanch = (e) => {
        e.preventDefault();
        const trimmedName = newRanchName.trim();
        if (!trimmedName) return;
        if (ranches.includes(trimmedName)) {
          showToast('此牧場已在名單中！', 'error');
          return;
        }
        
        setRanches([...ranches, trimmedName]);
        setRanchMapping(prev => ({
          ...prev,
          [trimmedName]: newRanchType
        }));

        setFormData(prev => ({
          ...prev,
          ranch: trimmedName,
          ranchType: newRanchType
        }));

        setNewRanchName('');
        showToast(`已新增契約牧場：${trimmedName} (${newRanchType})`);
      };

      const handleDeleteRanch = (name) => {
        setRanches(ranches.filter(r => r !== name));
        const newMapping = { ...ranchMapping };
        delete newMapping[name];
        setRanchMapping(newMapping);

        if (formData.ranch === name) {
          const fallbackRanch = ranches[0] || '';
          setFormData(prev => ({
            ...prev,
            ranch: fallbackRanch,
            ranchType: ranchMapping[fallbackRanch] || RANCH_TYPES[0]
          }));
        }
        showToast(`已自名單移除：${name}`, 'info');
      };

      const generateNotificationText = (data) => {
        let eggDeclarationText = '';
        let grandTotalBoxes = 0;
        let grandTotalEggs = 0;

        unlockedEggs.forEach(type => {
          const egg = data.eggs[type];
          const cartsVal = parseFloat(egg.carts) || 0;
          const boxesVal = parseFloat(egg.boxes) || 0;
          const trayBoxesVal = parseFloat(egg.trayBoxes) || 0;

          const totalBoxes = (cartsVal * CART_TO_BOX_RATIO) + boxesVal + trayBoxesVal;
          const totalEggs = Math.round((cartsVal * CART_TO_EGG_RATIO) + (boxesVal + trayBoxesVal) * BOX_TO_EGG_RATIO);

          grandTotalBoxes += totalBoxes;
          grandTotalEggs += totalEggs;

          if (cartsVal > 0 || boxesVal > 0 || trayBoxesVal > 0) {
            eggDeclarationText += `🥚 [${type}]：\n`;
            eggDeclarationText += `   ⁃ 產量：${cartsVal} 台車 / ${boxesVal} 箱散蛋 / ${trayBoxesVal} 箱盤蛋\n`;
            eggDeclarationText += `   ⁃ 折算：${totalBoxes.toFixed(1)} 箱 (約 ${totalEggs.toLocaleString()} 顆)\n`;
          }
        });

            chickenText += ` ⁃ ${type}：${parseFloat(item.count).toLocaleString()} 隻\n`;
            
            const mort = parseInt(item.mortality, 10) || 0;

               mortalityText += ` ⁃ ${type}：${mort} 隻\n`;
               totalMortality += mort;

━━━━━━━━━━━━━━━━━━
📍 牧場名稱：${data.ranch || '未選擇'} (${data.ranchType})
📅 產蛋日：${data.date}
━━━━━━━━━━━━━━━━━━
🐔 場內現存蛋雞數量：
${chickenText}
📊 今日蛋種與產蛋量：
${eggDeclarationText}----------------------------------
全場折算總箱數：${grandTotalBoxes.toFixed(1)} 箱
估算生產總顆數：約 ${grandTotalEggs.toLocaleString()} 顆
💡 (折算標準：1台車 = 22箱 = 4320顆)

💀 今日雞隻死亡數量 (總計 ${totalMortality} 隻)：
${mortalityText}

 ${data.notes ? data.notes : '各棟雞舍設備運作正常，蛋溫、水質正常。'}
━━━━━━━━━━━━━━━━━━
回報時間：${new Date().toLocaleString('zh-TW', { hour12: false })}
確認人員：茂生契約現場派駐人員`;

      // 匯出 CSV 檔案
      const handleExportCSV = () => {
        if (records.length === 0) {
          showToast('目前暫無紀錄可供匯出。', 'error');
          return;
        }

        const activeEggTypes = EGG_TYPES.filter(type => {
          return records.some(rec => {
            const egg = rec.eggs?.[type];
            if (!egg) return false;
            return (parseFloat(egg.carts) || 0) > 0 || 
                   (parseFloat(egg.boxes) || 0) > 0 || 
                   (parseFloat(egg.trayBoxes) || 0) > 0;
          });
        });

        const activeChickenTypes = CHICKEN_TYPES.filter(type => {
          return records.some(rec => {
            const cData = rec.chickens?.[type];
            if (!cData) return false;
            if (typeof cData === 'object') {
              return (parseFloat(cData.count) || 0) > 0 || (parseInt(cData.mortality, 10) || 0) > 0;
            }
            return (parseFloat(cData) || 0) > 0;
          });
        });

        let headers = ["產蛋日", "茂生契約牧場", "牧場型態"];
        activeEggTypes.forEach(type => {
          headers.push(`${type}_台車`, `${type}_散蛋箱`, `${type}_盤蛋箱`, `${type}_折算箱數`);
        });
        headers.push("全場總折算箱數", "估算總顆數");
        activeChickenTypes.forEach(type => {
          headers.push(`${type}_現存羽數`, `${type}_死亡數`);
        });
        headers.push("全場雞隻死亡總數", "現場備註");

        let csvRows = [];
        csvRows.push(headers.map(h => escapeCSV(h)).join(','));

        let colTotals = new Array(headers.length).fill(0);

        records.forEach(rec => {
          let rowCells = [];
          rowCells.push(rec.date);
          rowCells.push(rec.ranch);
          rowCells.push(rec.ranchType || '未填');

          let totalBoxesSum = 0;
          let totalEggsSum = 0;

          activeEggTypes.forEach(type => {
            const egg = rec.eggs?.[type] || { carts: 0, boxes: 0, trayBoxes: 0 };
            const cartsVal = parseFloat(egg.carts) || 0;
            const boxesVal = parseFloat(egg.boxes) || 0;
            const trayBoxesVal = parseFloat(egg.trayBoxes) || 0;
            const totalBoxes = (cartsVal * CART_TO_BOX_RATIO) + boxesVal + trayBoxesVal;
            const totalEggs = (cartsVal * CART_TO_EGG_RATIO) + (boxesVal + trayBoxesVal) * BOX_TO_EGG_RATIO;

            totalBoxesSum += totalBoxes;
            totalEggsSum += totalEggs;

            rowCells.push(cartsVal);
            rowCells.push(boxesVal);
            rowCells.push(trayBoxesVal);
            rowCells.push(parseFloat(totalBoxes.toFixed(1)));
          });

          rowCells.push(parseFloat(totalBoxesSum.toFixed(1)));
          rowCells.push(Math.round(totalEggsSum));

          activeChickenTypes.forEach(type => {
            const cData = rec.chickens?.[type];
            let count = 0;
            let mortality = 0;
            if (cData && typeof cData === 'object') {
              count = parseFloat(cData.count) || 0;
              mortality = parseInt(cData.mortality, 10) || 0;
            } else if (cData) {
              count = parseFloat(cData) || 0;
            }
            rowCells.push(count);
            rowCells.push(mortality);
          });

          rowCells.push(parseInt(rec.mortality, 10) || 0);
          rowCells.push(rec.notes || '');

          for (let i = 3; i < headers.length; i++) {
            if (i === headers.length - 1) continue; 
            colTotals[i] += parseFloat(rowCells[i]) || 0;
          }

          const formattedRow = rowCells.map((cell, idx) => {
            if (idx < 3 || idx === headers.length - 1) {
              return escapeCSV(cell);
            }
            return cell;
          }).join(',');

          csvRows.push(formattedRow);
        });

        let summaryCells = [];
        summaryCells.push("合計");
        summaryCells.push("");
        summaryCells.push(""); 

        for (let i = 3; i < headers.length; i++) {
          if (i === headers.length - 1) {
            summaryCells.push(""); 
          } else {
            const sumVal = colTotals[i];
            if (headers[i].includes("折算箱數") || headers[i].includes("全場總折算箱數")) {
              summaryCells.push(parseFloat(sumVal.toFixed(1)));
            } else if (headers[i].includes("台車")) {
              summaryCells.push(parseFloat(sumVal.toFixed(2)));
            } else {
              summaryCells.push(Math.round(sumVal));
            }
          }
        }

        const formattedSummaryRow = summaryCells.map((cell, idx) => {
          if (idx < 3 || idx === headers.length - 1) {
            return escapeCSV(cell);
          }
          return cell;
        }).join(',');

        csvRows.push(formattedSummaryRow);

        let csvContent = "\uFEFF" + csvRows.join('\n');
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `茂生契約牧場產量紀錄表_${new Date().toISOString().split('T')[0]}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        showToast('歷史生產數據 CSV 報表下載完成！');
      };

                  </div>

              </div>
            </div>

                    <div>
                      <span className="text-xs text-slate-400 font-bold block">總折算箱數</span>
                      <span className="text-lg sm:text-xl font-black text-emerald-700">{stats.totalConvertedBoxes.toFixed(1)} 箱</span>
                    </div>
                  </div>

                  <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 flex items-center gap-4">
                    <div className="p-3 rounded-xl bg-indigo-100 text-indigo-700">
                      <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M12 8c-1.657" /></svg>
                    </div>
                    <div>
                      <span className="text-xs text-slate-400 font-bold block">估算總顆數</span>
                      <span className="text-lg sm:text-xl font-black text-indigo-700">{stats.totalEggsCalculated.toLocaleString()} 顆</span>
                    </div>
                  </div>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                  
                  <div className="bg-white rounded-3xl shadow-sm border border-slate-200/60 p-6">
                    <h3 className="text-sm font-bold text-slate-800 mb-4 flex items-center gap-1.5">
                      📈 產量波動趨勢 (全場折算箱數)
                    </h3>
                    {sortedRecords.length < 2 ? (
                      <div className="h-60 flex flex-col justify-center items-center text-slate-400 bg-slate-50 rounded-2xl border border-dashed border-slate-100 text-xs">
                        至少需要 2 筆以上的紀錄才能進行波動圖表分析
                      </div>
                    ) : (
                      <div className="relative">
                        <div className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                          <svg viewBox="0 0 500 200" className="w-full h-48 overflow-visible">
                            <line x1="0" y1="50" x2="500" y2="50" stroke="#e2e8f0" strokeDasharray="4 4" />
                            <line x1="0" y1="100" x2="500" y2="100" stroke="#e2e8f0" strokeDasharray="4 4" />
                            <line x1="0" y1="150" x2="500" y2="150" stroke="#e2e8f0" strokeDasharray="4 4" />
                            
                            {(() => {
                              if (sortedRecords.length === 0) return null;
                              const maxBoxes = Math.max(...sortedRecords.map(r => {
                                const { totalBoxes } = calculateEggTotals(r.eggs, EGG_TYPES);
                                return totalBoxes;
                              })) || 1;
                              const minBoxes = Math.min(...sortedRecords.map(r => {
                                const { totalBoxes } = calculateEggTotals(r.eggs, EGG_TYPES);
                                return totalBoxes;
                              })) || 0;
                              const range = (maxBoxes - minBoxes) || 1;

                              const points = sortedRecords.map((r, idx) => {
                                const { totalBoxes } = calculateEggTotals(r.eggs, EGG_TYPES);
                                const x = sortedRecords.length > 1 ? (idx / (sortedRecords.length - 1)) * 440 + 30 : 250;
                                const y = 170 - ((totalBoxes - minBoxes) / range) * 120;
                                return { x, y, val: totalBoxes, date: r.date };
                              });

                              const pathD = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');

                              return (
                                <>
                                  <path
                                    d={`${pathD} L ${points[points.length-1].x} 180 L ${points[0].x} 180 Z`}
                                    fill="url(#emerald-grad)"
                                    opacity="0.15"
                                  />
                                  <path
                                    d={pathD}
                                    fill="none"
                                    stroke="#047857"
                                    strokeWidth="3"
                                    strokeLinecap="round"
                                    strokeLinejoin="round"
                                  />
                                  {points.map((p, idx) => (
                                    <g key={idx}>
                                      <circle cx={p.x} cy={p.y} r="5" fill="#ffffff" stroke="#047857" strokeWidth="3" />
                                      <text x={p.x} y={p.y - 12} fontSize="10" fontWeight="bold" textAnchor="middle" fill="#047857">
                                        {p.val.toFixed(1)}箱
                                      </text>
                                      <text x={p.x} y="195" fontSize="8" fill="#94a3b8" textAnchor="middle">
                                        {p.date.substring(5)}
                                      </text>
                                    </g>
                                  ))}
                                  <defs>
                                    <linearGradient id="emerald-grad" x1="0" y1="0" x2="0" y2="1">
                                      <stop offset="0%" stopColor="#047857" />
                                      <stop offset="100%" stopColor="#ffffff" stopOpacity="0" />
                                    </linearGradient>
                                  </defs>
                                </>
                              );
                            })()}
                          </svg>
                        </div>
                      </div>
                    )}
                  </div>

                  <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6">
                    <h3 className="text-sm font-bold text-slate-800 mb-4 flex items-center gap-1.5">
                      ⚠️ 全場雞隻死亡數統計與紅色警戒 (閾值: 5隻)
                    </h3>
                    {sortedRecords.length < 2 ? (
                      <div className="h-60 flex flex-col justify-center items-center text-slate-400 bg-slate-50 rounded-2xl border border-dashed border-slate-100 text-xs">
                        至少需要 2 筆以上的紀錄才能進行健康度統計
                      </div>
                    ) : (
                      <div className="relative">
                        <div className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                          <svg viewBox="0 0 500 200" className="w-full h-48 overflow-visible">
                            <line x1="0" y1="90" x2="500" y2="90" stroke="#ef4444" strokeWidth="1" strokeDasharray="5 5" />
                            <text x="490" y="85" fill="#ef4444" fontSize="8" fontWeight="bold" textAnchor="end">每日紅色警報點: 5 隻</text>

                            {(() => {
                              if (sortedRecords.length === 0) return null;
                              const maxMort = Math.max(...sortedRecords.map(r => r.mortality || 0)) || 5;

                              return sortedRecords.map((r, idx) => {
                                const x = sortedRecords.length > 1 ? (idx / (sortedRecords.length - 1)) * 430 + 35 : 250;
                                const height = ((r.mortality || 0) / Math.max(maxMort, 10)) * 130;
                                const y = 175 - height;
                                const isHigh = (r.mortality || 0) >= 5;

                                return (
                                  <g key={idx}>
                                    <rect
                                      x={x - 8}
                                      y={y}
                                      width="16"
                                      height={Math.max(height, 2)}
                                      rx="4"
                                      fill={isHigh ? '#dc2626' : '#475569'}
                                      opacity="0.85"
                                    />
                                    <text x={x} y={y - 8} fontSize="10" fontWeight="bold" textAnchor="middle" fill={isHigh ? '#dc2626' : '#475569'}>
                                      {r.mortality || 0}
                                    </text>
                                    <text x={x} y="192" fontSize="8" fill="#94a3b8" textAnchor="middle">
                                      {r.date.substring(5)}
                                    </text>
                                  </g>
                                );
                              });
                            })()}
                          </svg>
                        </div>
                      </div>
                    )}
                  </div>

                </div>
              </div>
            )}

            {/* --- 分頁：設定與管理 --- */}
            {activeTab === 'settings' && (
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                
                <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6">
                  <h2 className="text-lg font-bold text-slate-900 mb-4 flex items-center gap-2">
                    <span className="w-2.5 h-6 bg-emerald-600 rounded-full inline-block"></span>
                    🌾 茂生契約牧場名單管理
                  </h2>
                  <p className="text-xs text-slate-500 mb-4">
                    客製化您的契約合作牧場與指定其型態。在此新增後，可立即於「每日產量回報」的選單內選取。
                  </p>

                  {/* 新增牧場 */}
                  <form onSubmit={handleAddRanch} className="space-y-3.5 mb-6 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                    <h4 className="text-xs font-black text-slate-600">新增合作牧場</h4>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                      <input
                        type="text"
                        placeholder="請輸入新牧場名稱"
                        value={newRanchName}
                        onChange={(e) => setNewRanchName(e.target.value)}
                        className="px-3.5 py-2 border border-slate-300 rounded-xl focus:ring-2 focus:ring-emerald-500 text-xs font-bold"
                      />
                      <select
                        value={newRanchType}
                        onChange={(e) => setNewRanchType(e.target.value)}
                        className="px-3.5 py-2 border border-slate-300 rounded-xl focus:ring-2 focus:ring-emerald-500 text-xs font-bold"
                      >
                        {RANCH_TYPES.map((type, idx) => (
                          <option key={idx} value={type}>{type}</option>
                        ))}
                      </select>
                    </div>
                    <button
                      type="submit"
                      className="w-full bg-emerald-700 hover:bg-emerald-800 text-white py-2 rounded-xl text-xs font-bold shadow-md transition-all flex items-center justify-center gap-1"
                    >
                      <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M12 4v16m8-8H4" /></svg>
                      確定新增此牧場
                    </button>
                  </form>

                  <div className="space-y-2 max-h-[250px] overflow-y-auto pr-2">
                    {ranches.map((name, idx) => (
                      <div key={idx} className="flex justify-between items-center bg-slate-50 px-4 py-2.5 rounded-xl border border-slate-100">
                        <div className="flex flex-col">
                          <span className="text-sm font-bold text-slate-700">{name}</span>
                          <span className="text-[10px] text-slate-400 font-bold">{ranchMapping[name] || '傳統場'}</span>
                        </div>
                        {!DEFAULT_RANCHES.includes(name) && (
                          <button
                            onClick={() => handleDeleteRanch(name)}
                            className="text-red-400 hover:text-red-600 p-1 rounded-lg transition-all"
                            title="刪除自訂牧場"
                          >
                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862" /></svg>
                          </button>
                        )}
                      </div>
                    ))}
                  </div>
                </div>

                <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 flex flex-col justify-between">
                  <div>
                    <h2 className="text-lg font-bold text-slate-900 mb-3 flex items-center gap-2">
                      <span className="w-2.5 h-6 bg-slate-600 rounded-full inline-block"></span>
                      📖 計量標準備忘
                    </h2>
                    <div className="space-y-3.5 text-xs text-slate-600 leading-relaxed font-bold">
                      <p>
                        <strong>1. 蛋雞羽數與蛋種勾稽：</strong> 為避免現場人員誤登無關的蛋種產量，系統特別設計強制勾稽規則。只有當您選擇並輸入特定蛋雞羽數後，下方相對應的蛋種填報格才會帶出。
                      </p>
                      <p>
                        <strong>2. 產蛋率異常預警機制：</strong> 當日全場蛋量（台車 * 4320 + 散箱 * 200）必須位於總飼養羽數之 85% ~ 100% 之間，若超出此範圍將在送出時觸發安全確認對話窗，以確保無抄寫或按鍵輸入失誤。
                      </p>
                      <p>
                        <strong>3. 雞隻死亡動態回報：</strong> 將動態依據勾選的雞種，帶出各別輸入框來記錄死亡隻數，有效區隔不同雞群的健康狀況。
                      </p>
                      <p>
                        <strong>4. 數據完整離線儲存：</strong> 所有的資料均妥善保存於本機 LocalStorage 中，無任何對外傳輸之隱私疑慮。
                      </p>
                    </div>
                  </div>

                  {/* 復原初始設定 */}
                  <div className="pt-6 border-t border-slate-100 mt-6 flex justify-between items-center">
                    <div>
                      <h4 className="text-xs font-black text-slate-700">重設歷史紀錄</h4>
                      <p className="text-[10px] text-slate-400">一鍵刪除所有 LocalStorage 儲存資料。</p>
                    </div>
                    <button
                      onClick={() => {
                        if (window.confirm('確定要清空所有的歷史生產紀錄與自訂牧場配對嗎？本操作將無法還原！')) {
                          setRecords([]);
                          setRanches(DEFAULT_RANCHES);
                          setRanchMapping(INITIAL_RANCH_MAPPING);
                          localStorage.removeItem('maosheng_gh_ranch_records_v2_5');
                          localStorage.removeItem('maosheng_gh_ranch_list_v2_5');
                          localStorage.removeItem('maosheng_gh_ranch_mapping_v2_5');
                          showToast('歷史紀錄與設定值已成功還原為初始設定。', 'info');
                        }
                      }}
                      className="bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 px-3 py-2 rounded-xl text-xs font-bold transition-all"
                    >
                      還原初始設定
                    </button>
                  </div>

                </div>

              </div>
            )}

          </main>

          {/* 底部頁尾與版權 */}
          <footer className="text-center text-slate-400 text-[10px] sm:text-xs mt-12 pt-6 border-t border-slate-200">
            <p>© 2026 茂生契約牧場產量紀錄系統 {VERSION} - 專屬現場派駐人員生產紀錄助手</p>
            <p className="mt-1">符合 RWD 高可用行動裝置優先、無資安外洩風險之本機資料防範機制</p>
          </footer>
        </div>
      );
    }

    // 渲染應用程式至 HTML DOM 中
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
